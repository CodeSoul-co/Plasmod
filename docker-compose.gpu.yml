services:
  andb:
    environment:
      PLASMOD_EMBEDDER: ${PLASMOD_EMBEDDER:-onnx}
      PLASMOD_EMBEDDER_DEVICE: ${PLASMOD_EMBEDDER_DEVICE:-cuda}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${PLASMOD_GPU_COUNT:-1}
              capabilities: [gpu]

