# Baseline Memory Management Algorithm Configuration
# Establishes the YAML config pattern for all algorithm packages.
#
# Environment variable override:
#   ANDB_ALGORITHM_BASELINE_CONFIG=/path/to/this/file

baseline:
  initial_strength:    1.0
  decay_rate:         0.1
  decay_threshold:    0.1
  recall_boost:       1.1
  max_strength:       5.0
  compressed_level:    1
  summarization_level: 2
  retrieval:
    rrf_k: 60

    cold_search:
    batch_size: 128
    max_candidates: 1000
    buffer_factor: 3
    early_stop_score: 0.95
    no_improve_pages: 2
    dfs_relevance_threshold: 0.2
    weights:
      lexical: 0.5
      dense: 0.4
      recency: 0.1

  hnsw:
    m: 16
    ef_construction: 256
    ef_search: 64
