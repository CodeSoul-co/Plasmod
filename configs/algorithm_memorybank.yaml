# MemoryBank Memory Governance Algorithm Configuration
# All parameters are tunable. Code-level defaults apply when keys are absent.
# Operators override via this YAML or environment variables.
#
# Environment variable override:
#   PLASMOD_ALGORITHM_MEMORYBANK_CONFIG=/path/to/this/file

memorybank:
  # ── Admission thresholds ─────────────────────────────────────────────────────
  admission:
    th_active:   0.65   # admission_score ≥ th_active → active lifecycle
    th_session:  0.40   # ≥ th_session → session_only; < → candidate

  # ── Admission weights ──────────────────────────────────────────────────────
    w_salience:          0.25
    w_stability:         0.20
    w_task_relevance:    0.25
    w_user_explicitness: 0.15
    w_noise:             0.15

  # ── Retention weights ──────────────────────────────────────────────────────
  retention:
    w_recency:    0.20
    w_recall_cnt: 0.20
    w_salience:   0.15
    w_confidence: 0.15
    w_conflict:   0.20
    w_reaffirm:   0.10

  # ── Recall scoring weights ─────────────────────────────────────────────────
  recall:
    w_retention:  0.30
    w_salience:   0.20
    w_freshness:  0.20
    w_confidence: 0.20
    w_conflict:   0.10

  # ── Reinforcement deltas ──────────────────────────────────────────────────
  reinforcement:
    delta_used_in_answer:  0.5
    delta_user_confirmed:  1.0
    delta_tool_supported:  1.0

  # ── Decay ──────────────────────────────────────────────────────────────────
  decay:
    default_rate:         0.05  # λ for memories without per-type override
    threshold_stale:      0.25  # retention below this → stale
    threshold_archive:    0.10  # retention below this → archived

  # ── Initial strength by memory type ────────────────────────────────────────
  initial_strength:
    episodic:              1.0
    semantic:              2.0
    procedural:            2.0
    social:                1.5
    reflective:            2.0
    factual:               3.0
    profile:               2.5
    affective_state:       0.8
    preference_constraint:  3.0

  # ── Per-type decay rate λ (per day) ───────────────────────────────────────
  decay_rate:
    episodic:              0.05
    semantic:              0.02
    procedural:            0.01
    social:                0.03
    reflective:            0.02
    factual:               0.01
    profile:               0.005
    affective_state:       0.20
    preference_constraint:  0.005

  # ── Recall boost & limits ──────────────────────────────────────────────────
  recall_boost:  1.1  # multiplicative boost per recall event
  max_strength:  5.0  # cap on Strength

  # ── Compression ────────────────────────────────────────────────────────────
  compressed_level:    1
  summarization_level: 2

  # Member C retrieval / cold-tier experiment knobs.
  retrieval:
    rrf_k: 60

  cold_search:
    # Throughput / latency knobs for archived-memory benchmarks.
    batch_size: 128
    max_candidates: 1000
    buffer_factor: 3
    early_stop_score: 0.95
    no_improve_pages: 2
    # Recall guardrail for dense / brute-force cold retrieval.
    dfs_relevance_threshold: 0.2
    # Final cold score composition before RRF fusion.
    weights:
      lexical: 0.5
      dense: 0.4
      recency: 0.1

  # HNSW archived-index parameters for cold ANN experiments.
  hnsw:
    m: 16
    ef_construction: 256
    ef_search: 64

# Zep-style governance plugin configuration.
# NOTE:
# - Kept in this shared file on purpose (no new config file).
# - "zep" is treated as a memory-governance algorithm profile, not an external store.
# - Storage remains in Plasmod; algorithm output is applied via AlgorithmDispatch.
zep:
  # Core graph construction parameters from Zep paper.
  graph:
    context_window_messages: 4     # entity/fact extraction uses current + last n messages
    entity_embedding_dim: 1024     # entity name embedding dimension
    episode_types: ["message", "text", "json"]
    temporal_model: "bi_temporal"  # T (valid time) + T_tx (transaction time)
    temporal_fields: ["valid_at", "invalid_at", "created_at_tx", "expired_at_tx"]

  # Retrieval pipeline: f = constructor(reranker(search(query))).
  retrieval:
    search_methods: ["cosine", "bm25", "bfs"]
    rerank_methods: ["rrf", "mmr", "episode_mentions", "node_distance", "cross_encoder"]
    top_k: 20
    # In DMR-specific runs, paper reports top 10; keep this override for reproducibility.
    top_k_dmr: 10
    bfs:
      enabled: true
      # Prefer recent episodes as BFS seeds when available.
      seed_strategy: "recent_episodes"
    constructor:
      include: ["facts", "entities"]
      include_date_range: true

  # Community graph construction.
  community:
    algorithm: "label_propagation" # paper uses label propagation (not Leiden)
    dynamic_update: true            # one-step incremental assignment for new entities
    periodic_refresh: true

  # Model selections reported in the paper's experiments.
  models:
    embedding: "bge-m3"
    reranker: "bge-m3"
    graph_construction_llm: "gpt-4o-mini-2024-07-18"
    response_llm: ["gpt-4o-mini-2024-07-18", "gpt-4o-2024-11-20", "gpt-4-turbo-2024-04-09"]

  # Temporal extraction constraints.
  temporal_extraction:
    datetime_format: "ISO8601"
    use_reference_timestamp: true
    present_tense_uses_reference_time: true
    infer_relative_time: true
