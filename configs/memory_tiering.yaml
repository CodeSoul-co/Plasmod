memory_tiering:
  hot_cache:
    high_watermark_percent: 0.80
    low_watermark_percent: 0.60
    eviction_batch_size: 16

    score:
      wr: 0.25
      wf: 0.20
      ws: 0.55
      lambda: 0.80

    penalty:
      alpha_size: 0.45
      beta_write_back: 0.20
      gamma_hit_prob: 0.25
      delta_reload: 0.10

    frequency_norm_window: 16
    recency_tau_seconds: 120
    recency_tau_by_type:
      memory: 180
      state: 120
      artifact: 90
    hit_prob_ewma_alpha: 0.35
    estimated_pool_bytes: 268435456

    object_type_weight:
      memory: 0.95
      state: 0.85
      artifact: 0.70

    reload_ease_by_type:
      memory: 0.30
      state: 0.50
      artifact: 0.70
    reload_ease_ewma_alpha: 0.20

    write_back_by_type:
      memory: 0.40
      state: 0.60
      artifact: 0.50

    queue:
      protected_ratio: 0.5

    dirty:
      max_flush_retries: 3

    semantic_rules:
      keyword_boost:
        core_fact: 0.20
        evidence: 0.15
        summary: 0.10
        final: 0.10
        temporary: -0.10
        retry: -0.10
        intermediate: -0.08

    placement_rules:
      force_class1_keywords: [core_fact, critical, must_keep]
      force_class2_keywords: [thinking, reasoning, payload]
      force_class3_keywords: [archived, deleted, obsolete]

    pointer_policy:
      class1_types: [memory, state]
      class2_types: [artifact]
      class3_types: []
