syntax = "proto3";

package milvus.proto.modelservice;
option go_package="github.com/milvus-io/milvus/pkg/v2/proto/modelservicepb";

// =============================================================================
// DEPRECATED — NOT WIRED INTO PLASMOD RUNTIME
// =============================================================================
// These three RPC services (TextEmbeddingService / RerankService /
// HighlightService) are inherited verbatim from Milvus and target a
// Python-side model server (sentence-transformers, cross-encoder, etc.)
// that Milvus runs out-of-process via gRPC.
//
// Plasmod does NOT call any of these RPCs. As of feature/retrieval-b
// the production paths are:
//
//   * Embeddings  →  src/internal/dataplane/embedding/*.go
//                    (TfidfEmbedder pure-Go, or HTTPEmbedder against
//                     OpenAI/ZhipuAI/Cohere REST APIs, or GGUF via
//                     go-llama.cpp libbinding.a — never Python gRPC)
//
//   * Retrieval   →  src/internal/dataplane/retrievalplane/bridge.go
//                    + sparse_bridge.go  (CGO → C++ Knowhere/FAISS
//                     for HNSW / IVF_FLAT / DiskANN / SPARSE_INVERTED
//                     / SPARSE_WAND — never Python)
//
//   * Reranking   →  src/internal/retrieval/retriever.go markFinalScores
//                    (pure-Go RRF + dense+sparse fusion)
//
// Verification: `grep -rln modelservicepb src/` returns zero runtime
// importers — the modelservicepb package below is generated stubs only.
//
// Kept here solely so a future re-sync from upstream Milvus pkg/proto
// does not produce a confusing structural diff.  If you are looking
// for "where embeddings happen", the file you want is
// dataplane/embedding/embedding.go, not this one.
// =============================================================================

service TextEmbeddingService {
    rpc Embedding(TextEmbeddingRequest) returns (TextEmbeddingResponse);
}

service RerankService {
    rpc Rerank(TextRerankRequest) returns (TextRerankResponse);
}

service HighlightService {
    rpc Highlight(HighlightRequest) returns (HighlightResponse);
}

message Status {
    int32 code = 1;
    string msg = 2;
}

message DenseVector {
    enum DType {
	DTYPE_UNSPECIFIED = 0;
	DTYPE_FLOAT = 1;
	DTYPE_INT8 = 2;
    }

    DType dtype = 1;
    bytes data = 2;
    int32 dim = 3; // Optional
}

message SparseVector {
    repeated int32 indices = 1;
    repeated float values = 2;
}

message MultiVector {
    repeated DenseVector token_vectors = 1;
    int32 dim = 2; // Optional
}

message TextEmbeddingRequest {
    string model = 1;
    repeated string texts = 2;
    map<string, string> params = 3;
}

message EmbeddingResult {
    DenseVector dense = 1;
    SparseVector sparse = 2;
    MultiVector multi_vector = 3;
}

message TextEmbeddingResponse {
    Status status = 1;
    map<string, string> extra_info = 2;
    repeated EmbeddingResult results = 3;
}

message TextRerankRequest {
    string model = 1;
    string query = 2;
    repeated string documents = 3;
    map<string, string> params = 4;
}

message TextRerankResponse {
    Status status = 1;
    map<string, string> extra_info = 2;
    repeated float scores = 3;
}

message HighlightRequest {
    string model = 1;
    string query = 2;
    repeated string documents = 3;
    map<string, string> params = 4;
}

message HighlightResult {
    repeated string sentences = 1;
    repeated float scores = 2;
}

message HighlightResponse {
    Status status = 1;
    map<string, string> extra_info = 2;
    repeated HighlightResult results = 3;
}
