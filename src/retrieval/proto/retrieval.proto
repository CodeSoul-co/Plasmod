syntax = "proto3";

package retrieval;

option go_package = "andb/src/retrieval/generated";

// ============================================================================
// Retrieval Request
// ============================================================================

message RetrievalRequest {
    string query_text = 1;              // Query text
    repeated float query_vector = 2;    // Pre-computed embedding (optional)
    
    // Isolation boundaries (required)
    string tenant_id = 3;
    string workspace_id = 4;
    
    // Filter conditions
    string agent_id = 5;
    string session_id = 6;
    string scope = 7;                   // private / session / workspace / global
    string memory_type = 8;             // episodic / semantic / procedural
    
    // Retrieval control
    int32 top_k = 9;
    double min_confidence = 10;
    double min_importance = 11;
    TimeRange time_range = 12;
    
    // Retrieval path switches
    bool enable_dense = 13;             // default true
    bool enable_sparse = 14;            // default true
    bool enable_filter_only = 15;       // filter only mode (see docs Section 11)
}

message TimeRange {
    int64 from_unix_ts = 1;
    int64 to_unix_ts = 2;
}

// ============================================================================
// Retrieval Result
// ============================================================================

message Candidate {
    string object_id = 1;
    string object_type = 2;             // memory / event / artifact
    double score = 3;                   // RRF merged score
    
    // Metadata
    string agent_id = 4;
    string session_id = 5;
    string scope = 6;
    int32 version = 7;
    string provenance_ref = 8;          // for member C to trace provenance
    
    // Content
    string content = 9;
    string summary = 10;
    double confidence = 11;
    double importance = 12;
    int32 level = 13;                   // distillation depth: 0=raw, 1=summary, 2=abstraction
    string memory_type = 14;            // episodic / semantic / procedural
    string verified_state = 15;         // verified / unverified / disputed
    double salience_weight = 16;        // for final reranking after RRF
    
    // Source channels
    repeated string source_channels = 17;   // ["dense", "sparse", "filter"]
    
    // Graph expansion seed marker (for member C)
    bool is_seed = 18;
    double seed_score = 19;
}

message CandidateList {
    repeated Candidate candidates = 1;
    int32 total_found = 2;
    int64 retrieved_at_unix_ts = 3;
    QueryMeta query_meta = 4;
}

message QueryMeta {
    int64 latency_ms = 1;
    int32 dense_hits = 2;
    int32 sparse_hits = 3;
    int32 filter_hits = 4;
    repeated string channels_used = 5;
}

// ============================================================================
// Service Definition
// ============================================================================

service RetrievalService {
    // Single retrieval
    rpc Retrieve(RetrievalRequest) returns (CandidateList);
    
    // Batch retrieval (week 4 implementation)
    rpc BatchRetrieve(BatchRetrievalRequest) returns (BatchRetrievalResponse);
}

message BatchRetrievalRequest {
    repeated RetrievalRequest requests = 1;
}

message BatchRetrievalResponse {
    repeated CandidateList results = 1;
}
